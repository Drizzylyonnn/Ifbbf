<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <link rel="stylesheet" href="contact.css">
</head>
<body>

<section class="contact">
  <div class="container">

    <!-- LEFT -->
    <div class="left">
      <h2>Get in Touch</h2>
      <p>
        Have questions or want to work with us? Fill out the form and our team will respond shortly.
      </p>

      <div class="info-box">
        <p><strong>Response time:</strong> Within 24 hours</p>
        <p><strong>Email:</strong> infoifbb1@gmail.com</p>
      </div>

      <p class="small-text">
        We respect your privacy. Your data will only be used to respond to your request.
      </p>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <form id="contact-form">

        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <textarea name="message" rows="5" placeholder="Your Message" required></textarea>

        <label class="checkbox">
          <input type="checkbox" required>
          I agree to the privacy policy
        </label>

        <button type="submit">Send Message</button>

        <p id="form-status"></p>

      </form>
    </div>

  </div>
</section>

<script src="contact.js"></script>
</body>
</html>
